{% extends 'base.html' %}

{% block title %}发布拍品{% endblock %}

{% block content %}
    <div class="row justify-content-center" id="create-item-app" v-cloak>
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-camera"></i> 发布新拍品</h5>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <small>提示：发布后需管理员审核通过并安排场次后才会上架。</small>
                    </div>

                    <form @submit.prevent="submitItem">
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label">拍品名称</label>
                                <input type="text" class="form-control" v-model="form.name" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">所属分类</label>
                                <select class="form-select" v-model="form.category" required>
                                    <option disabled value="">请选择...</option>
                                    <option v-for="cat in categories" :value="cat.id">[[ cat.name ]]</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">起拍价 (¥)</label>
                                <input type="number" step="0.01" class="form-control" v-model="form.start_price"
                                       required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">保留价 (¥)</label>
                                <input type="number" step="0.01" class="form-control" v-model="form.reserve_price"
                                       placeholder="低于此价不成交">
                            </div>
                        </div>

                        <!-- 拍卖类型选择 -->
                        <div class="mb-3">
                            <label class="form-label d-block">拍卖规则</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" v-model="form.auction_type" value="increase" id="typeIncrease">
                                <label class="form-check-label" for="typeIncrease">增价拍卖 <span class="badge bg-primary">推荐</span></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" v-model="form.auction_type" value="decrease" id="typeDecrease">
                                <label class="form-check-label" for="typeDecrease">减价拍卖</label>
                            </div>
                        </div>

                        <!-- 加/降价幅度 -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">[[ form.auction_type === 'increase' ? '每次加价幅度 (¥)' : '每次降价幅度 (¥)' ]]</label>
                                <input type="number" step="0.01" class="form-control" v-model="form.price_step" required>
                            </div>
                        </div>

                        <!-- 减价拍特有字段 -->
                        <div class="row mb-3" v-if="form.auction_type === 'decrease'">
                            <div class="col-md-6">
                                <label class="form-label">降价间隔 (秒)</label>
                                <input type="number" step="1" class="form-control" v-model="form.reduce_interval" placeholder="例如: 60">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">底价 (¥)</label>
                                <input type="number" step="0.01" class="form-control" v-model="form.bottom_price" placeholder="例如: 100">
                            </div>
                        </div>

                        <!-- 期望排期 -->
                        <div class="row mb-4 bg-light p-3 rounded border">
                            <h5 class="mb-3 text-primary"><i class="fas fa-calendar-alt"></i> 期望排期预设</h5>
                            <div class="col-md-6">
                                <label class="form-label">期望开拍时间 <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control" v-model="form.expected_start_time" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">期望截拍时间 <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control" v-model="form.expected_end_time" required>
                                <small class="text-muted">管理员审核通过后将完全根据此时间自动安排专场</small>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">保证金比例 (%)</label>
                                <input type="number" step="1" class="form-control" v-model="form.deposit_ratio"
                                       readonly>
                                <div class="form-text">默认 20%</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">定金比例 (%)</label>
                                <input type="number" step="1" class="form-control" v-model="form.earnest_money_ratio"
                                       readonly>
                                <div class="form-text">默认 10%</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">拍品描述</label>
                            <textarea class="form-control" v-model="form.description" rows="3" placeholder="请输入拍品的详细描述（如残次、年份等，选填）"></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">拍品图片 (最多5张)</label>
                            <input type="file" class="form-control" multiple accept="image/*" @change="handleFileChange"
                                   required>
                            <div class="mt-2 d-flex gap-2">
                                <span v-for="file in fileList" class="badge bg-secondary">[[ file.name ]]</span>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" :disabled="loading">
                                <span v-if="loading" class="spinner-border spinner-border-sm"></span>
                                提交审核
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        new Vue({
            el: '#create-item-app',
            delimiters: ['[[', ']]'],
            data: {
                categories: [],
                form: {
                    name: '',
                    category: '',
                    start_price: '',
                    reserve_price: '',
                    description: '',
                    deposit_ratio: 20,
                    earnest_money_ratio: 10,
                    auction_type: 'increase',
                    price_step: '',
                    reduce_interval: '',
                    bottom_price: '',
                    expected_start_time: '',
                    expected_end_time: ''
                },
                fileList: [],
                loading: false
            },
            mounted() {
                this.fetchCategories();
            },
            methods: {
                fetchCategories() {
                    // 定义请求地址
                    const url = '/items/categories/';

                    axios.get(url).then(res => {
                        console.log("分类数据:", res.data); // 在控制台打印数据
                        this.categories = res.data.results || res.data;

                        // 如果拿到数据了但是是空的，也弹个窗提示一下
                        if (this.categories.length === 0) {
                            alert("连接成功，但后台没有分类数据！请去Admin后台添加。");
                        }
                    }).catch(err => {
                        console.error("分类加载失败详情:", err);

                        // === 调试核心：直接弹窗显示错误 ===
                        let msg = "分类加载挂了！\n";
                        msg += "请求地址: " + url + "\n";
                        if (err.response) {
                            msg += "状态码: " + err.response.status + "\n";
                            msg += "错误信息: " + JSON.stringify(err.response.data);
                        } else {
                            msg += "错误: 网络无法连接或路径错误";
                        }
                        alert(msg);
                    });
                },
                handleFileChange(event) {
                    this.fileList = Array.from(event.target.files).slice(0, 5);
                },
                submitItem() {
                    if (this.fileList.length === 0) {
                        alert("请至少上传一张图片");
                        return;
                    }

                    this.loading = true;
                    let formData = new FormData();

                    for (let key in this.form) {
                        // 如果是 null 或 undefined，不传
                        if (this.form[key] != null) {
                            formData.append(key, this.form[key]);
                        }
                    }

                    this.fileList.forEach(file => {
                        formData.append('upload_images', file);
                    });

                    // 修正2：加上 /api/ 前缀
                    axios.post('/items/', formData, {
                        headers: {'Content-Type': 'multipart/form-data'}
                    }).then(res => {
                        alert("发布成功！请等待管理员审核。");
                        window.location.href = '/my-items/';
                    }).catch(err => {
                        this.loading = false;
                        console.error(err);

                        // 修正3：显示真实错误原因
                        let errorMsg = "发布失败";

                        if (err.response) {
                            if (err.response.status === 403) {
                                errorMsg = "权限拒绝：您不是【卖家】角色，或登录已过期。请退出重登。";
                            } else if (err.response.data) {
                                // 把后端返回的 JSON 错误转成文字显示出来
                                errorMsg = "校验失败: " + JSON.stringify(err.response.data);
                            } else {
                                errorMsg = "服务器错误: " + err.response.status;
                            }
                        } else {
                            errorMsg = "网络连接失败";
                        }

                        alert(errorMsg); // 这里会弹出具体原因！
                    });
                }
            }
        });
    </script>
{% endblock %}
