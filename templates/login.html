{% extends 'base.html' %}

{% block title %}用户登录{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5" id="login-app" v-cloak>
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> 用户登录</h4>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-danger" v-if="error">[[ error ]]</div>

                <form @submit.prevent="handleLogin">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" v-model="form.username" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" v-model="form.password" required>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg" :disabled="loading">
                            <span v-if="loading" class="spinner-border spinner-border-sm"></span>
                            <span v-else>立即登录</span>
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                还没有账号？ <a href="/register/" class="text-decoration-none fw-bold">去注册</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    new Vue({
        el: '#login-app',
        delimiters: ['[[', ']]'],
        data: {
            form: {
                username: '',
                password: ''
            },
            error: null,
            loading: false
        },
        methods: {
            handleLogin() {
                this.loading = true;
                this.error = null;
                
                axios.post('/users/login/', this.form)
                    .then(res => {
                        // 登录成功，跳转回首页
                        window.location.href = '/';
                    })
                    .catch(err => {
                        this.loading = false;
                        if (err.response && err.response.data) {
                            this.error = err.response.data.error || "登录失败，请检查用户名或密码";
                        } else {
                            this.error = "服务器连接失败";
                        }
                    });
            }
        }
    });
</script>
{% endblock %}
