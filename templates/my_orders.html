{% extends 'base.html' %}

{% block title %}我的订单{% endblock %}

{% block content %}
<div id="orders-app" v-cloak>
    <h3 class="mb-4"><i class="fas fa-shopping-cart"></i> 我的拍卖订单</h3>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>订单号</th>
                        <th>拍品名称</th>
                        <th>成交金额</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="order in orders" :key="order.id">
                        <td><small>[[ order.order_no ]]</small></td>
                        <td class="fw-bold">[[ order.item_name ]]</td>
                        <td class="text-danger">¥[[ order.final_price ]]</td>
                        <td>
                            <span class="badge" 
                                  :class="{'bg-warning text-dark': order.status===0, 'bg-success': order.status===1, 'bg-secondary': order.status===2}">
                                [[ getStatusText(order.status) ]]
                            </span>
                        </td>
                        <td>
                            <a v-if="order.status === 0" 
                               :href="'/pay-order/' + order.order_no" 
                               class="btn btn-primary btn-sm">
                                <i class="fas fa-credit-card"></i> 去支付
                            </a>
                            <button v-if="order.status === 1" class="btn btn-outline-success btn-sm" disabled>
                                已完成
                            </button>
                        </td>
                    </tr>
                    <tr v-if="orders.length === 0">
                        <td colspan="5" class="text-center py-5 text-muted">
                            暂无订单，快去<a href="/auctions/">拍卖大厅</a>看看吧
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    new Vue({
        el: '#orders-app',
        delimiters: ['[[', ']]'],
        data: {
            orders: []
        },
        mounted() {
            this.fetchOrders();
        },
        methods: {
            fetchOrders() {
                axios.get('trades/orders/').then(res => {
                    this.orders = res.data.results || res.data;
                });
            },
            getStatusText(status) {
                const map = {0: '待支付', 1: '已支付', 2: '已取消', 3: '已完成'};
                return map[status] || '未知';
            }
        }
    });
</script>
{% endblock %}
